<title>WanderLens — Discover Your Next Destination</title>
<meta name="description" content="WanderLens helps travelers discover new countries with curated guides on culture, top places, food, and practical tips.">
<link rel="stylesheet" href="./base.css">

<body>
  <div class="app" id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <a class="logo" onclick="showHome()">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="WanderLens logo">
            <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
            <ellipse cx="16" cy="16" rx="6" ry="14" stroke="currentColor" stroke-width="1.5"/>
            <line x1="2" y1="12" x2="30" y2="12" stroke="currentColor" stroke-width="1.5"/>
            <line x1="2" y1="20" x2="30" y2="20" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="16" cy="16" r="2.5" fill="currentColor"/>
          </svg>
          <span class="logo-text">WanderLens</span>
        </a>
        <div class="header-actions">
          <button class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        8 destinations to explore
      </div>
      <h1>Your guide to the world's best places</h1>
      <p>Culture, etiquette, top places, food, and practical tips — everything you need before stepping off the plane.</p>
    </section>

    <!-- Country Grid -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Destinations</h2>
        <span class="section-count">Select a country</span>
      </div>
      <div class="countries-grid" id="countriesGrid"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>
        <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
      </p>
    </footer>
  </div>

  <!-- Detail Overlay -->
  <div class="detail-overlay" id="detailOverlay"></div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-close">
      <button class="close-btn" id="closeDetail" aria-label="Close detail view">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <span id="detailCountryLabel" style="font-size:var(--text-sm); color:var(--color-text-muted); font-weight:500;"></span>
    </div>
    <img class="detail-hero-img" id="detailHeroImg" alt="" loading="lazy" decoding="async">
    <div class="detail-body" id="detailBody"></div>
  </div>

  <script src="./app.js" defer></script>
